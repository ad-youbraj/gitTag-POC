name: Release Nuget Package

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Validate
              run: |
                  TAG='${{github.ref_name}}'
                  if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-((alpha|beta|rc)\.[0-9]+))?$ ]]; then
                      echo "✅ Tag format is valid: $TAG"
                  else
                      echo "❌ Invalid tag format: $TAG"
                      echo "Expected formats: v10.0.0 or v10.0.0-beta.1 or v10.0.0-rc.2"
                      exit 1
                  fi
            - name: Validate tag is on allowed Branch
              run: |
                  ALLOWED_BRANCH="main"
                  TAG_COMMIT="${{github.sha}}"

                  if git branch -r --contains "$TAG_COMMIT" | grep -q "origin/${ALLOWED_BRANCH}"; then
                      echo "Tag points to a commit on ${ALLOWED_BRANCH}"
                  else
                      echo "❌ Tag must point to a commit on ${ALLOWED_BRANCH}"
                      echo "Branches containing this commit:"
                      git branch -r --contains "$TAG_COMMIT"
                      exit 1
                  fi
            - name: Validate version increment
              run: |
                  CURRENT_TAG="${{ github.ref_name }}"
                  TAG_MESSAGE=$(git tag -l --format='%(contents)' "$CURRENT_TAG")
                  echo "DEBUG TAG_MESSAGE: '$TAG_MESSAGE'"
                  if echo "$TAG_MESSAGE" | grep -q "^force:"; then
                      echo "⚠️ Force flag detected: $TAG_MESSAGE"
                      echo "✅ Skipping version increment validation"
                      exit 0
                  fi

                  PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${CURRENT_TAG}$" | head -n 1)
                  if [ -z "$PREVIOUS_TAG" ]; then
                      echo "✅ No previous tag found, this is the first release"
                      exit 0
                  fi
                  echo "Previous tag: $PREVIOUS_TAG"
                  echo "Current tag:  $CURRENT_TAG"
                  PREV=$(echo "$PREVIOUS_TAG" | sed 's/^v//')
                  CURR=$(echo "$CURRENT_TAG" | sed 's/^v//')

                  PREV_MAJOR=$(echo "$PREV" | cut -d. -f1)
                  PREV_MINOR=$(echo "$PREV" | cut -d. -f2)
                  PREV_PATCH=$(echo "$PREV" | cut -d. -f3 | cut -d- -f1)
                  PREV_PRE=$(echo "$PREV" | grep -oP '(?<=-)(alpha|beta|rc)\.\K[0-9]+' || echo "")
                  PREV_PRE_LABEL=$(echo "$PREV" | grep -oP '(alpha|beta|rc)(?=\.[0-9]+)' || echo "")

                  CURR_MAJOR=$(echo "$CURR" | cut -d. -f1)
                  CURR_MINOR=$(echo "$CURR" | cut -d. -f2)
                  CURR_PATCH=$(echo "$CURR" | cut -d. -f3 | cut -d- -f1)
                  CURR_PRE=$(echo "$CURR" | grep -oP '(?<=-)(alpha|beta|rc)\.\K[0-9]+' || echo "")
                  CURR_PRE_LABEL=$(echo "$CURR" | grep -oP '(alpha|beta|rc)(?=\.[0-9]+)' || echo "")

                  echo "--- PARSED VALUES ---"
                  echo "PREV: major=$PREV_MAJOR minor=$PREV_MINOR patch=$PREV_PATCH pre_label=$PREV_PRE_LABEL pre=$PREV_PRE"
                  echo "CURR: major=$CURR_MAJOR minor=$CURR_MINOR patch=$CURR_PATCH pre_label=$CURR_PRE_LABEL pre=$CURR_PRE"

                  VALID=false

                  # Case 1: major bump — minor and patch reset to 0, no pre-release
                  if [ "$CURR_MAJOR" -eq "$((PREV_MAJOR + 1))" ] && [ "$CURR_MINOR" -eq 0 ] && [ "$CURR_PATCH" -eq 0 ] && [ -z "$CURR_PRE" ]; then
                    VALID=true

                  # Case 2: minor bump — patch resets to 0, major unchanged, no pre-release
                  elif [ "$CURR_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURR_MINOR" -eq "$((PREV_MINOR + 1))" ] && [ "$CURR_PATCH" -eq 0 ] && [ -z "$CURR_PRE" ]; then
                    VALID=true

                  # Case 3: patch bump — major and minor unchanged, no pre-release
                  elif [ "$CURR_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURR_MINOR" -eq "$PREV_MINOR" ] && [ "$CURR_PATCH" -eq "$((PREV_PATCH + 1))" ] && [ -z "$CURR_PRE" ]; then
                    VALID=true

                  # Case 4: pre-release bump — same version, same label, pre number +1
                  elif [ "$CURR_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURR_MINOR" -eq "$PREV_MINOR" ] && [ "$CURR_PATCH" -eq "$PREV_PATCH" ] && [ "$CURR_PRE_LABEL" = "$PREV_PRE_LABEL" ] && [ -n "$CURR_PRE" ] && [ -n "$PREV_PRE" ] && [ "$CURR_PRE" -eq "$((PREV_PRE + 1))" ]; then
                    VALID=true

                  # Case 5: promote beta to stable — same version, current has no pre-release
                  elif [ "$CURR_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURR_MINOR" -eq "$PREV_MINOR" ] && [ "$CURR_PATCH" -eq "$PREV_PATCH" ] && [ -n "$PREV_PRE" ] && [ -z "$CURR_PRE" ]; then
                    VALID=true

                  # Case 6: new pre-release on next patch — patch +1, pre-release must start at 1
                  elif [ "$CURR_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURR_MINOR" -eq "$PREV_MINOR" ] && [ "$CURR_PATCH" -eq "$((PREV_PATCH + 1))" ] && [ -n "$CURR_PRE" ] && [ "$CURR_PRE" -eq 1 ]; then
                    VALID=true

                  # Case 7: new pre-release on next minor — minor +1, patch resets to 0, pre-release must start at 1
                  elif [ "$CURR_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURR_MINOR" -eq "$((PREV_MINOR + 1))" ] && [ "$CURR_PATCH" -eq 0 ] && [ -n "$CURR_PRE" ] && [ "$CURR_PRE" -eq 1 ]; then
                    VALID=true

                  # Case 8: new pre-release on next major — major +1, minor+patch reset to 0, pre-release must start at 1
                  elif [ "$CURR_MAJOR" -eq "$((PREV_MAJOR + 1))" ] && [ "$CURR_MINOR" -eq 0 ] && [ "$CURR_PATCH" -eq 0 ] && [ -n "$CURR_PRE" ] && [ "$CURR_PRE" -eq 1 ]; then
                    VALID=true
                  fi

                  if [ "$VALID" = true ]; then
                      echo "✅ Version increment is valid: $PREVIOUS_TAG → $CURRENT_TAG"
                  else
                      echo "❌ Invalid version increments: $PREVIOUS_TAG → $CURRENT_TAG"
                      echo "Only increment by 1. Lower segments must reset to 0 on major/minor bump."
                      exit 1
                  fi
            - name: Delete tag if validation failed
              if: failure()
              run: |
                  curl -X DELETE \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${{ github.ref_name }}"
                  echo "🗑️ Deleted invalid tag ${{ github.ref_name }}"
